<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Snake Game</title>
  <style>
    html,body{height:100%;margin:0;display:flex;align-items:center;justify-content:center;background:#111;color:#eee;font-family:Arial}
    #game{background:#000;border:6px solid #222}
    #info{position:fixed;top:12px;left:12px}
    button{margin-left:8px}
  </style>
</head>
<body>
  <div id="info">
    Score: <span id="score">0</span>
    High: <span id="high">0</span>
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="restart">Restart</button>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="touch-controls" aria-hidden="true">
    <button id="up">▲</button>
    <div>
      <button id="left">◀</button>
      <button id="right">▶</button>
    </div>
    <button id="down">▼</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const startBtn = document.getElementById('start');
    const restartBtn = document.getElementById('restart');

    const baseGrid = 20;
    let grid = baseGrid;
    let cols = Math.floor(canvas.width / grid);
    let rows = Math.floor(canvas.height / grid);

    let snake;
    let food;
    let dir;
    let running = false;
    let loopId;
    let speed = 120; // ms per tick
    let paused = false;

    function reset() {
      resizeCanvas();
      snake = [{x: Math.floor(cols/2), y: Math.floor(rows/2)}];
      dir = {x: 0, y: 0};
      placeFood();
      scoreEl.textContent = '0';
      running = false;
      paused = false;
      speed = 120;
      if(loopId) clearTimeout(loopId);
      draw();
    }

    function placeFood(){
      food = {
        x: Math.floor(Math.random()*cols),
        y: Math.floor(Math.random()*rows)
      };
      // avoid placing on snake
      if(snake.some(s => s.x===food.x && s.y===food.y)) placeFood();
    }

    function drawCell(x,y,color){
      ctx.fillStyle = color;
      ctx.fillRect(x*grid,y*grid,grid-1,grid-1);
    }

    function update() {
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      // wrap-around edges
      if(head.x < 0) head.x = cols-1;
      if(head.x >= cols) head.x = 0;
      if(head.y < 0) head.y = rows-1;
      if(head.y >= rows) head.y = 0;

      // collision with self
      if(snake.some((s, i) => i>0 && s.x===head.x && s.y===head.y)){
        gameOver();
        return;
      }

      snake.unshift(head);

      // eat food
      if(head.x===food.x && head.y===food.y){
        scoreEl.textContent = parseInt(scoreEl.textContent)+1;
        placeFood();
      } else {
        snake.pop();
      }
    }

    function draw(){
      ctx.fillStyle = '#040404';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      // draw food
      drawCell(food.x,food.y,'#e91e63');

      // draw snake
      for(let i=0;i<snake.length;i++){
        drawCell(snake[i].x,snake[i].y, i===0 ? '#00e676' : '#76ff03');
      }
    }

    function loop(){
      if(!running || paused) return;
      update();
      draw();
      loopId = setTimeout(loop, speed);
    }

    function start(){
      if(dir.x===0 && dir.y===0){ dir = {x:1,y:0}; }
      running = true;
      paused = false;
      loop();
    }

    function restart(){
      reset();
      start();
    }

    function gameOver(){
      running = false;
      const score = parseInt(scoreEl.textContent, 10);
      const high = parseInt(localStorage.getItem('snake_high')||0,10);
      if(score>high) localStorage.setItem('snake_high', score);
      document.getElementById('high').textContent = Math.max(score, high);
      setTimeout(()=>{
        alert('Game Over. Score: ' + score);
      },10);
    }

    document.addEventListener('keydown', e => {
      const key = e.key;
      if(key==='ArrowUp' && dir.y===0){ dir = {x:0,y:-1}; }
      if(key==='ArrowDown' && dir.y===0){ dir = {x:0,y:1}; }
      if(key==='ArrowLeft' && dir.x===0){ dir = {x:-1,y:0}; }
      if(key==='ArrowRight' && dir.x===0){ dir = {x:1,y:0}; }
      if(key===' '){ if(!running) start(); else { paused = !paused; if(!paused) loop(); } }
    });

    // touch controls
    document.getElementById('up').addEventListener('click', ()=>{ if(dir.y===0) dir={x:0,y:-1}; if(!running) start();});
    document.getElementById('down').addEventListener('click', ()=>{ if(dir.y===0) dir={x:0,y:1}; if(!running) start();});
    document.getElementById('left').addEventListener('click', ()=>{ if(dir.x===0) dir={x:-1,y:0}; if(!running) start();});
    document.getElementById('right').addEventListener('click', ()=>{ if(dir.x===0) dir={x:1,y:0}; if(!running) start();});

    startBtn.addEventListener('click', () => start());
    restartBtn.addEventListener('click', () => restart());
    document.getElementById('pause').addEventListener('click', ()=>{
      if(!running) return;
      paused = !paused;
      document.getElementById('pause').textContent = paused ? 'Resume' : 'Pause';
      if(!paused) loop();
    });

    function resizeCanvas(){
      // make canvas fit viewport but keep square
      const size = Math.min(window.innerWidth - 40, window.innerHeight - 140, 600);
      canvas.width = size;
      canvas.height = size;
      // recalc grid to keep cells roughly same pixel size
      grid = Math.max(8, Math.floor(size / 20));
      cols = Math.floor(canvas.width / grid);
      rows = Math.floor(canvas.height / grid);
    }

    window.addEventListener('resize', ()=>{
      const oldHead = snake && snake[0] ? {...snake[0]} : null;
      resizeCanvas();
      if(oldHead){
        // clamp snake positions to new bounds
        snake = snake.map(s => ({x: Math.min(s.x, cols-1), y: Math.min(s.y, rows-1)}));
      }
      draw();
    });

    // load high score
    document.getElementById('high').textContent = localStorage.getItem('snake_high')||0;

    reset();
  </script>
</body>
</html>
